<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyaalBugger | Operator Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 600px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        .logo { font-size: 20px; font-weight: 800; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 8px; }
        textarea { 
            width: 100%; height: 120px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; color: #fff; padding: 15px; font-family: 'Monaco', monospace; resize: none; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .btn { 
            width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--neon); opacity: 0.9; }
        #st { margin-top: 20px; text-align: center; font-size: 12px; font-weight: bold; }
        .pulse { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px var(--neon); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><span class="pulse"></span> OPERATOR CONSOLE</div>
        </div>
        <div class="input-group">
            <label>Remote AI Command Packet</label>
            <textarea id="remoteCmd" placeholder='{"title": "...", "content": "...", "type": "..."}'></textarea>
        </div>
        <button class="btn" onclick="executeRemote()">Execute Sync</button>
        <div id="st">READY FOR DATA INJECTION...</div>
    </div>

    <script>
        const SB_URL = 'https://fvxodipuudkhzykpleul.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        async function executeRemote() {
            const statusBox = document.getElementById('st');
            const input = document.getElementById('remoteCmd');
            try {
                statusBox.innerText = "TRANSMITTING...";
                statusBox.style.color = "var(--neon)";
                
                const cmd = JSON.parse(input.value);
                const { error } = await supabaseClient.from('logs').insert([cmd]);
                
                if (error) throw error;

                statusBox.innerText = "SUCCESS: PACKET DELIVERED";
                statusBox.style.color = "#00ff88";
                input.value = '';
            } catch(e) {
                statusBox.innerText = "ERROR: INVALID PACKET FORMAT";
                statusBox.style.color = "#ff4444";
                console.error(e);
            }
        }
    </script>
</body>
</html>
