<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoyaalBugger | Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 500px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-size: 18px; font-weight: 800; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .back-link { color: var(--neon); text-decoration: none; font-size: 12px; border-bottom: 1px solid var(--neon); padding-bottom: 2px; opacity: 0.8; }
        textarea { 
            width: 100%; height: 180px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; color: #00f2ff; padding: 15px; font-family: 'Monaco', monospace; resize: none; 
            box-sizing: border-box; outline: none; font-size: 16px; /* 16px zapobiega zoomowi na iPhone */
        }
        textarea:focus { border-color: var(--neon); }
        .btn { 
            width: 100%; background: var(--neon); color: #000; border: none; padding: 20px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; 
            letter-spacing: 2px; margin-top: 20px; font-size: 16px; transition: 0.3s;
        }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        #st { margin-top: 20px; text-align: center; font-size: 12px; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">OPERATOR_CONSOLE</div>
            <a href="index.html" class="back-link">← DASHBOARD</a>
        </div>
        <textarea id="remoteCmd" placeholder='Wklej kod od Gemini...'></textarea>
        <button class="btn" onclick="executeRemote()">Execute Sync</button>
        <div id="st">READY</div>
    </div>

    <script>
        const SB_URL = 'https://fvxodipuudkhzykpleul.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        
        async function executeRemote() {
            const statusBox = document.getElementById('st');
            const input = document.getElementById('remoteCmd');
            if (!input.value) return;
            try {
                statusBox.innerText = "SENDING...";
                statusBox.style.color = "var(--neon)";
                const cmd = JSON.parse(input.value);
                const { error } = await supabaseClient.from('logs').insert([cmd]);
                if (error) throw error;
                statusBox.innerText = "SUCCESS: DATA INJECTED";
                statusBox.style.color = "#00ff88";
                input.value = '';
            } catch(e) {
                statusBox.innerText = "ERROR: WRONG FORMAT";
                statusBox.style.color = "#ff4444";
            }
        }
    </script>
</body>
</html>
