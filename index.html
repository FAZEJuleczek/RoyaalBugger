<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royaal | Private C2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.03); --gold: #ffae00; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; border: 1px solid var(--neon); border-radius: 15px; padding: 20px; background: var(--card); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); margin: auto; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; min-height: 400px; overflow-y: auto; }
        .label { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; display: block; }
        
        .item { padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 12px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .supa-item { border-left: 3px solid var(--gold); background: rgba(255, 174, 0, 0.05); }
        .h1-item { border-left: 3px solid #fff; background: rgba(255, 255, 255, 0.05); }
        
        .status-badge { font-size: 9px; padding: 2px 5px; border-radius: 3px; background: #222; margin-right: 5px; text-transform: uppercase; color: var(--neon); }
        .err-link { color: #fff; text-decoration: underline; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="color: var(--neon); font-weight: bold; letter-spacing: 3px;">JULIUSZ_PRIVATE_C2</div>
        <div id="clock" style="font-size: 10px; opacity: 0.6;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">● MY_SUPABASE_STREAM</span>
            <div id="supa-stream">Inicjowanie...</div>
        </div>

        <div class="card">
            <span class="label">● MY_H1_REPORTS</span>
            <div id="h1-stream">Czekam na autoryzację H1...</div>
        </div>
    </div>
</div>

<script>
    // --- TWOJE CENTRUM DOWODZENIA ---
    const CONFIG = {
        // Skoro lecisz w Env Vars na Vercelu, to tutaj wrzuć tylko odniesienia
        // Jeśli to czysty JS, wklej je tu RAZ, a potem zrób repo PRIVATE.
        h1Auth: 'Basic cm95YWFsOkw0RVdWSE9YTHdLYjBnaG1PTERDZWFKAL...', 
        supaKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...', 
        supaUrl: 'https://fvxodipuudkhzykpleul.supabase.co'
    };

    const _supa = supabase.createClient(CONFIG.supaUrl, CONFIG.supaKey);
    const proxy = 'https://cors-anywhere.herokuapp.com/';

    async function loadEverything() {
        const h1Out = document.getElementById('h1-stream');
        const supaOut = document.getElementById('supa-stream');

        // 1. POBIERANIE Z HACKERONE (TYLKO TOKEN)
        try {
            const response = await fetch(proxy + 'https://api.hackerone.com/v1/reports', {
                headers: { 
                    'Authorization': CONFIG.h1Auth, 
                    'Accept': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            });

            const res = await response.json();
            if (res.data) {
                h1Out.innerHTML = res.data.map(r => `
                    <div class="item h1-item">
                        <b style="color:var(--gold)">#${r.id}</b> [${r.attributes.state}]<br>${r.attributes.title}
                    </div>`).join('');
            }
        } catch (e) { h1Out.innerHTML = "Błąd H1 (Sprawdź Proxy/Token)"; }

        // 2. POBIERANIE Z SUPABASE
        try {
            const { data } = await _supa.from('logs').select('*');
            if (data) {
                supaOut.innerHTML = data.reverse().map(l => `
                    <div class="item supa-item"><b>${l.title}</b>: ${l.content}</div>
                `).join('');
            }
        } catch (e) { supaOut.innerHTML = "Błąd Supy."; }
    }

    // START
    window.onload = loadEverything;

    // Realtime dla Supabase (żeby logi wpadały same!)
    _supa.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'logs' }, loadEverything).subscribe();
</script>
    
</body>
</html>
