<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoyaalBugger | Intelligence C2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.05); --gold: #ffae00; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 1000px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        .nav-btn { border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 8px; text-decoration: none; font-size: 11px; font-weight: bold; transition: 0.3s; }
        .nav-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .section-title { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        /* Styl logów z Supabase */
        .bug-item { background: rgba(255, 174, 0, 0.05); border-left: 3px solid var(--gold); padding: 12px; margin: 10px 0; border-radius: 6px; font-size: 13px; }
        
        /* Styl automatycznych newsów */
        .feed-item { background: rgba(0, 242, 255, 0.05); border-left: 3px solid var(--neon); padding: 12px; margin: 10px 0; border-radius: 6px; font-size: 13px; animation: slideIn 0.5s ease-out; }
        .feed-item a { color: var(--neon); text-decoration: none; font-weight: bold; font-size: 11px; display: block; margin-top: 5px; text-transform: uppercase; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">ROYAAL_INTELLIGENCE</div>
            <a href="admin.html" class="nav-btn">TERMINAL</a>
        </div>

        <div class="grid">
            <div class="card">
                <div class="section-title"><span style="color:var(--gold)">●</span> PRIVATE LOGS</div>
                <div id="logs-container">Łączenie z bazą...</div>
            </div>

            <div class="card">
                <div class="section-title"><span style="color:var(--neon)">●</span> GLOBAL BUG FEED</div>
                <div id="rss-feed">Przeszukiwanie HackerOne & Bugcrowd...</div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURACJA SUPABASE ---
        const SB_URL = 'https://fvxodipuudkhzykpleul.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Pobieranie Twoich logów
        async function loadSupabaseLogs() {
            const { data } = await supabaseClient.from('logs').select('*');
            const container = document.getElementById('logs-container');
            if (data) {
                container.innerHTML = data.reverse().slice(0, 5).map(log => `
                    <div class="bug-item">
                        <b>${log.title}</b>: ${log.content}
                    </div>
                `).join('');
            }
        }

        // --- AUTOMATYCZNY FEED (HackerOne & Bugcrowd) ---
        async function loadGlobalFeeds() {
            const feedContainer = document.getElementById('rss-feed');
            // Używamy RSS2JSON do pobrania publicznych raportów HackerOne
            const hackerOneRSS = "https://hackerone.com/hacktivity.rss";
            const api_url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(hackerOneRSS)}`;

            try {
                const response = await fetch(api_url);
                const data = await response.json();
                
                if (data.items) {
                    feedContainer.innerHTML = data.items.slice(0, 5).map(item => `
                        <div class="feed-item">
                            <b>${item.author || 'HackerOne'}</b>: ${item.title.substring(0, 60)}...
                            <a href="${item.link}" target="_blank">SZCZEGÓŁY RAPORTU →</a>
                        </div>
                    `).join('');
                }
            } catch (e) {
                feedContainer.innerHTML = "Błąd pobierania feedu.";
            }
        }

        // Odświeżanie
        setInterval(() => {
            loadSupabaseLogs();
            loadGlobalFeeds();
        }, 30000); // Co 30 sekund

        loadSupabaseLogs();
        loadGlobalFeeds();
    </script>
</body>
</html>
