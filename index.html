<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyaalBugger | C2 Dashboard</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 1000px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; color: var(--neon); text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }
        .stat { font-size: 32px; font-weight: 700; color: var(--neon); margin: 10px 0; }
        .label { font-size: 12px; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }
        .bug-item { background: rgba(255, 174, 0, 0.1); border-left: 3px solid #ffae00; padding: 10px; margin: 10px 0; border-radius: 4px; font-size: 14px; }
        .pulse { width: 10px; height: 10px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--neon); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">RoyaalBugger // C2</div>
            <div style="font-size: 14px; opacity: 0.6;"><span class="pulse"></span> SYSTEM ACTIVE</div>
        </div>
        
        <div class="grid">
            <div class="card">
                <div class="label">Total Targets</div>
                <div class="stat">01</div>
                <div class="label" style="color: var(--neon);">Last connection: 2 mins ago</div>
            </div>
            <div class="card">
                <div class="label">Session Status</div>
                <div class="stat" style="color: #ffae00;">PENDING</div>
                <div class="label">Waiting for tasking...</div>
            </div>
        </div>

        <h3 style="margin-top: 40px; opacity: 0.8;">🚧 Unfinished Business</h3>
        <div class="bug-item"><b>[HIGH]</b> Integrate Discord Webhook for visual exfiltration</div>
        <div class="bug-item"><b>[MEDIUM]</b> Fix buffer reset on large PNG transfers</div>
    </div>
</body>
</html>
