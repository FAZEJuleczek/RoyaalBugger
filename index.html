<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyaalBugger | Operator Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* TWOJE ORYGINALNE STYLE */
        :root {
            --neon: #00f2ff;
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.05);
            --yt-red: #ff0000;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR W TWOIM STYLU */
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 242, 255, 0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999; padding: 100px 20px;
        }
        #sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0, 242, 255, 0.1); }
        
        .nav-item {
            padding: 15px; margin-bottom: 10px; border-radius: 12px;
            cursor: pointer; border: 1px solid transparent; transition: 0.3s;
            text-transform: uppercase; font-size: 12px; letter-spacing: 1px;
            opacity: 0.7;
        }
        .nav-item:hover { border-color: var(--neon); opacity: 1; background: rgba(0, 242, 255, 0.05); }
        .nav-item.yt { color: var(--yt-red); border-color: rgba(255, 0, 0, 0.2); }
        .nav-item.yt:hover { border-color: var(--yt-red); background: rgba(255, 0, 0, 0.05); }

        /* HAMBURGER */
        #menu-btn {
            position: fixed; top: 30px; left: 30px; z-index: 1000;
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            color: var(--neon); padding: 12px; border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(10px);
        }

        /* TWOJA KONTENEROWA STRUKTURA */
        .container {
            width: 90%; max-width: 600px; background: var(--card);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: 0.5s;
        }

        .header { border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        .logo { font-size: 20px; font-weight: 800; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        .pulse { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px var(--neon); animation: blink 1.5s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }

        /* WIDOKI */
        .view { display: none; }
        .active { display: block; }

        /* STATYSTYKI YT */
        .yt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; }
        .stat-val { font-size: 24px; font-weight: 800; color: var(--neon); display: block; margin-top: 5px; }

        /* LISTA LOGÓW */
        .log-list { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        .log-item { font-size: 12px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); opacity: 0.8; font-family: "Monaco", monospace; }
    </style>
</head>
<body>

    <button id="menu-btn" onclick="toggleMenu()">☰ MENU</button>

    <div id="sidebar">
        <div class="nav-item" onclick="showView('main')">System Dashboard</div>
        <div class="nav-item" onclick="showView('logs')">Live Data Stream</div>
        <div class="nav-item yt" onclick="showView('yt')">🔴 YT Mode (Stats)</div>
    </div>

    <div class="container" id="main-container">
        <div id="view-main" class="view active">
            <div class="header">
                <div class="logo"><span class="pulse"></span> OPERATOR CONSOLE</div>
            </div>
            <div id="status-text" style="text-align: center; font-size: 12px; opacity: 0.6; letter-spacing: 1px;">
                READY FOR DATA INJECTION...
            </div>
            <div class="yt-grid">
                <div class="stat-card">REPORTS<span class="stat-val" id="total-reports">0</span></div>
                <div class="stat-card">ACCEPTED<span class="stat-val" id="acc-reports" style="color: #00ff00;">0</span></div>
            </div>
        </div>

        <div id="view-logs" class="view">
            <div class="header"><div class="logo">DATA STREAM</div></div>
            <div class="log-list" id="logs-container">INITIALIZING...</div>
        </div>

        <div id="view-yt" class="view">
            <div class="header"><div class="logo" style="color: var(--yt-red)">YT COMMAND</div></div>
            <div class="yt-grid">
                <div class="stat-card">SUBS<span class="stat-val">1,240</span></div>
                <div class="stat-card">PENDING<span class="stat-val" id="pend-reports" style="color: #ffcc00;">0</span></div>
            </div>
            <div class="stat-card" style="margin-top: 15px; border-color: rgba(255,0,0,0.3)">
                <label>Last Comment</label>
                <div style="font-size: 13px; margin-top: 10px; font-style: italic">"Dobra robota, czekam na więcej!"</div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://fvxodipuudkhzykpleul.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        function showView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            toggleMenu();
            // Zmiana koloru neonu w trybie YT
            const root = document.documentElement;
            if(v === 'yt') root.style.setProperty('--neon', '#ff0000');
            else root.style.setProperty('--neon', '#00f2ff');
        }

        async function loadData() {
            const { data } = await _supabase.from('logs').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('total-reports').innerText = data.length;
                document.getElementById('acc-reports').innerText = data.filter(l => l.content?.toLowerCase().includes('triaged')).length;
                document.getElementById('pend-reports').innerText = data.filter(l => l.content?.toLowerCase().includes('new')).length;
                
                document.getElementById('logs-container').innerHTML = data.map(l => `
                    <div class="log-item">> [${l.type}] ${l.title}</div>
                `).join('');
            }
        }

        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'logs' }, () => loadData()).subscribe();
        loadData();
    </script>
</body>
</html>
