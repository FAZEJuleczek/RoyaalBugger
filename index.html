<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoyaalBugger | C2 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; box-sizing: border-box; }
        .container { width: 100%; max-width: 1000px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .nav-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px 18px; border-radius: 10px; cursor: pointer; text-decoration: none; font-size: 12px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .nav-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stat { font-size: 22px; font-weight: 700; color: var(--neon); margin: 8px 0; }
        .bug-item { background: rgba(255, 174, 0, 0.1); border-left: 4px solid #ffae00; padding: 15px; margin: 12px 0; border-radius: 8px; font-size: 14px; line-height: 1.4; }
        .pulse { width: 10px; height: 10px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--neon); animation: blink 1.5s infinite; }
        
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .container { padding: 20px; border-radius: 16px; }
            .logo { font-size: 18px; }
            .header { justify-content: center; text-align: center; }
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><span class="pulse"></span> ROYAAL // C2</div>
            <a href="admin.html" class="nav-btn">TERMINAL</a>
        </div>
        <div class="grid">
            <div class="card">
                <div style="font-size: 10px; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase;">Cloud Status</div>
                <div id="db-status" class="stat">LINKING...</div>
            </div>
            <div class="card">
                <div style="font-size: 10px; opacity: 0.5; letter-spacing: 1px; text-transform: uppercase;">Last Update</div>
                <div id="last-update" class="stat">--:--:--</div>
            </div>
        </div>
        <h3 style="margin-top: 30px; opacity: 0.7; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">📡 Incoming Data Stream</h3>
        <div id="logs-container">Oczekiwanie na transmisję...</div>
    </div>

    <script>
        const SB_URL = 'https://fvxodipuudkhzykpleul.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function loadLogs() {
            try {
                const { data, error } = await supabaseClient.from('logs').select('*');
                const container = document.getElementById('logs-container');
                const statusBox = document.getElementById('db-status');
                if (error) throw error;
                statusBox.innerText = "ONLINE";
                statusBox.style.color = "#00f2ff";
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="opacity: 0.4; font-size: 13px;">Baza pusta. Czekam na logi...</p>';
                } else {
                    container.innerHTML = '';
                    data.reverse().forEach(log => {
                        const div = document.createElement('div');
                        div.className = 'bug-item';
                        div.innerHTML = `<span style="opacity:0.6; font-size:11px;">[${log.type || 'LOG'}]</span><br><b>${log.title}</b>: ${log.content}`;
                        container.appendChild(div);
                    });
                }
            } catch (err) {
                document.getElementById('db-status').innerText = "OFFLINE";
                document.getElementById('db-status').style.color = "#ff4444";
            }
        }
        setInterval(loadLogs, 3000);
        loadLogs();
    </script>
</body>
</html>
