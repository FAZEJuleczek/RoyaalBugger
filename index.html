<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoyaalBugger | Operator Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #050505;
            --card: rgba(255,255,255,0.05);
            --yt: #ff0000;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: "Inter", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            border-right: 1px solid var(--neon); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999; padding-top: 80px;
        }
        #sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0, 242, 255, 0.1); }
        
        .nav-item {
            padding: 15px 25px; margin: 5px 15px; border-radius: 12px;
            cursor: pointer; border: 1px solid transparent; transition: 0.3s;
            text-transform: uppercase; font-size: 11px; letter-spacing: 2px; opacity: 0.6;
        }
        .nav-item:hover { border-color: var(--neon); opacity: 1; background: rgba(0, 242, 255, 0.05); }
        .nav-item.active-nav { border-color: var(--neon); opacity: 1; background: rgba(0, 242, 255, 0.1); }

        /* --- PRZYCISK MENU --- */
        #menu-trigger {
            position: fixed; top: 25px; left: 25px; z-index: 10000;
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            color: var(--neon); padding: 12px 15px; border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        #menu-trigger:hover { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        /* --- TWOJA ORYGINALNA KONTENEROWA STRUKTURA --- */
        .container {
            width: 90%; max-width: 500px; background: var(--card);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: 0.5s; position: relative;
        }

        .header { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        .logo { font-size: 18px; font-weight: 800; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .pulse { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px var(--neon); animation: blink 1.5s infinite; }
        
        /* --- WIDOKI --- */
        .view { display: none; }
        .view.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- STATYSTYKI --- */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 16px; text-align: center; }
        .stat-label { font-size: 9px; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; display: block; }
        .stat-num { font-size: 22px; font-weight: 800; color: var(--neon); margin-top: 5px; display: block; }

        /* --- LOGI --- */
        .log-list { max-height: 200px; overflow-y: auto; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
        .log-item { font-family: "Monaco", monospace; font-size: 11px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); opacity: 0.7; }

        /* --- STARE KLASY Z TWOJEGO KODU --- */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 8px; }
        textarea { width: 100%; height: 100px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; padding: 15px; font-family: "Monaco", monospace; resize: none; box-sizing: border-box; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,242,255,0.2); }
        .btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px var(--neon); opacity: 0.9; }
        #st { margin-top: 20px; text-align: center; font-size: 11px; opacity: 0.6; }

        @keyframes blink { 0%, 100% { opacity: 1 } 50% { opacity: 0.3 } }
    </style>
</head>
<body>

    <button id="menu-trigger" onclick="toggleMenu()">☰</button>

    <nav id="sidebar">
        <div class="nav-item active-nav" onclick="showView('cmd', this)">Operator Console</div>
        <div class="nav-item" onclick="showView('stats', this)">Data Stream</div>
        <div class="nav-item" id="yt-link" onclick="showView('yt', this)" style="color: var(--yt); border-color: rgba(255,0,0,0.2);">YouTube Mode</div>
    </nav>

    <div class="container">
        <div class="header">
            <div class="logo"><span class="pulse"></span> OPERATOR CONSOLE</div>
        </div>

        <div id="view-cmd" class="view active">
            <div class="input-group">
                <label>Remote AI Command Packet</label>
                <textarea id="remoteCmd" placeholder='{"title": "...", "content": "...", "type": "..."}'></textarea>
            </div>
            <button class="btn" onclick="executeSync()">Execute Sync</button>
            <div id="st">READY FOR DATA INJECTION...</div>
        </div>

        <div id="view-stats" class="view">
            <div class="stats-row">
                <div class="stat-card"><span class="stat-label">TOTAL LOGS</span><span class="stat-num" id="total-val">0</span></div>
                <div class="stat-card"><span class="stat-label">ACCEPTED</span><span class="stat-num" id="acc-val" style="color: #00ff00;">0</span></div>
            </div>
            <div class="log-list" id="logs-container">Wczytywanie strumienia...</div>
        </div>

        <div id="view-yt" class="view">
            <div class="stats-row">
                <div class="stat-card"><span class="stat-label">YT SUBSCRIBERS</span><span class="stat-num" style="color: var(--yt);">1,240</span></div>
                <div class="stat-card"><span class="stat-label">PENDING</span><span class="stat-num" id="pend-val" style="color: #ffcc00;">0</span></div>
            </div>
            <div class="stat-card" style="margin-top: 15px; border-color: rgba(255,0,0,0.2);">
                <span class="stat-label">Latest Community Feedback</span>
                <p style="font-size: 11px; font-style: italic; margin-top: 10px; opacity: 0.8;">"Świetny materiał, czekam na więcej o Bug Bounty!"</p>
            </div>
        </div>
    </div>

    <script>
        // TWOJE DANE SUPABASE
        const SB_URL = 'https://fvxodipuudkhzykpleul.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        function showView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            
            document.getElementById('view-' + viewId).classList.add('active');
            el.classList.add('active-nav');
            
            // ZMIANA KOLORU NEONU DLA YT MODE
            const root = document.documentElement;
            if(viewId === 'yt') {
                root.style.setProperty('--neon', 'var(--yt)');
            } else {
                root.style.setProperty('--neon', '#00f2ff');
            }
            
            toggleMenu();
        }

        async function fetchAll() {
            const { data } = await _supabase.from('logs').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('total-val').innerText = data.length;
                document.getElementById('acc-val').innerText = data.filter(l => l.content?.toLowerCase().includes('triaged')).length;
                document.getElementById('pend-val').innerText = data.filter(l => l.content?.toLowerCase().includes('new')).length;
                
                document.getElementById('logs-container').innerHTML = data.slice(0, 10).map(l => `
                    <div class="log-item">> [${l.type}] ${l.title}</div>
                `).join('');
            }
        }

        async function executeSync() {
            const area = document.getElementById('remoteCmd');
            const status = document.getElementById('st');
            try {
                const payload = JSON.parse(area.value);
                status.innerText = "INJECTING PACKET...";
                const { error } = await _supabase.from('logs').insert([payload]);
                if (error) throw error;
                status.innerText = "SYNC COMPLETE. DATA STABLE.";
                area.value = "";
                fetchAll();
            } catch (e) {
                status.innerText = "ERROR: INVALID PACKET STRUCTURE";
                console.error(e);
            }
        }

        // AUTO-UPDATE
        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'logs' }, () => fetchAll()).subscribe();
        fetchAll();
    </script>
</body>
</html>
