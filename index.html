<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royaal | Private C2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.03); --gold: #ffae00; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; border: 1px solid var(--neon); border-radius: 15px; padding: 20px; background: var(--card); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); margin: auto; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; min-height: 400px; }
        .label { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; display: block; }
        
        /* Styl Twoich logów */
        .item { padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 12px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .supa-item { border-left: 3px solid var(--gold); background: rgba(255, 174, 0, 0.05); }
        .h1-item { border-left: 3px solid #fff; background: rgba(255, 255, 255, 0.05); }
        
        .status-badge { font-size: 9px; padding: 2px 5px; border-radius: 3px; background: #222; margin-right: 5px; text-transform: uppercase; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="color: var(--neon); font-weight: bold; letter-spacing: 3px;">JULIUSZ_PRIVATE_C2</div>
        <div style="font-size: 10px; opacity: 0.6;">SYSTEM_TIME: <span id="clock">00:00:00</span></div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">● MY_SUPABASE_STREAM</span>
            <div id="supa-stream">Inicjowanie strumienia...</div>
        </div>

        <div class="card">
            <span class="label">● MY_H1_REPORTS</span>
            <div id="h1-stream">Czekam na autoryzację H1...</div>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACJA ---
    const CONFIG = {
        supaUrl: 'https://fvxodipuudkhzykpleul.supabase.co',
        supaKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ',
        h1User: 'royaal',       // <--- WPISZ TU SWÓJ NICK H1
        h1Id: 'royaal',        // <--- WPISZ TU IDENTIFIER Z TABELKI
        h1Secret: 'L4EWVHOXLwKb0ghmOLCezJi1+ymx4/E+e7zlPfMp31I=' // Twój Secret z obrazka
    };

    const _supa = supabase.createClient(CONFIG.supaUrl, CONFIG.supaKey);

    // 1. POBIERANIE LOGÓW Z SUPABASE (Twoje "hi" itp.)
    async function loadSupa() {
        const out = document.getElementById('supa-stream');
        try {
            const { data, error } = await _supa.from('logs').select('*');
            if (error) throw error;
            if (data) {
                out.innerHTML = data.reverse().map(l => `
                    <div class="item supa-item">
                        <b style="color:var(--gold)">${l.title || 'LOG'}</b><br>
                        ${l.content || '...'}
                    </div>
                `).join('');
            }
        } catch (e) { out.innerHTML = "Błąd Supabase: " + e.message; }
    }

    // 2. POBIERANIE TWOICH PRYWATNYCH RAPORTÓW Z H1
    async function loadH1() {
        const out = document.getElementById('h1-stream');
        const auth = btoa(`${CONFIG.h1Id}:${CONFIG.h1Secret}`);
        
        try {
            // Używamy darmowego mostu (proxy), bo H1 blokuje zapytania z przeglądarki
            const proxy = 'https://cors-anywhere.herokuapp.com/';
            const api = `https://api.hackerone.com/v1/reports?filter[reporter][]=${CONFIG.h1User}`;

            const response = await fetch(proxy + api, {
                headers: { 'Authorization': `Basic ${auth}`, 'Accept': 'application/json' }
            });

            if (response.status === 403) {
                out.innerHTML = `<div style="font-size:11px; color:#ff4444;">KLIKNIJ TUTAJ I WŁĄCZ PROXY:<br><a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank" style="color:#fff">cors-anywhere.herokuapp.com/corsdemo</a><br>Potem odśwież stronę.</div>`;
                return;
            }

            const res = await response.json();
            if (res.data) {
                out.innerHTML = res.data.map(r => `
                    <div class="item h1-item">
                        <span class="status-badge">${r.attributes.state}</span>
                        <b>#${r.id}</b><br>
                        ${r.attributes.title}
                    </div>
                `).join('');
            }
        } catch (e) { out.innerHTML = "Problem z API H1."; }
    }

    // --- LOGIKA STARTOWA ---
    loadSupa();
    loadH1();

    // Live update dla Twoich logów (Supabase)
    _supa.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'logs' }, () => loadSupa()).subscribe();

    // Zegar
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>

</body>
</html>
