<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROYAAL C2 DASHBOARD</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* Menu Boczne */
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: #0a0a0a; border-right: 1px solid #333;
            transition: 0.3s; z-index: 999; padding-top: 80px;
        }
        #sidebar.open { left: 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid #222; transition: 0.3s; }
        .nav-item:hover { background: #1a1a1a; }
        .yt-item { color: #ff0000; font-weight: bold; border: 1px solid #ff0000; margin: 20px; border-radius: 5px; text-align: center; }

        /* Przycisk Menu */
        #menu-btn {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: #000; color: #fff; border: 1px solid #333;
            padding: 10px 15px; cursor: pointer; border-radius: 5px;
        }

        /* Kontenery widoków */
        .view { display: none; padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
        .active { display: block; }

        /* Statystyki YT */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .stat-card { background: #111; padding: 20px; border-radius: 10px; text-align: center; border-left: 5px solid #444; }
        .log-entry { background: #111; padding: 15px; border: 1px solid #222; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <button id="menu-btn" onclick="toggleMenu()">☰ MENU</button>

    <div id="sidebar">
        <div class="nav-item" onclick="showView('dashboard')">🏠 DASHBOARD</div>
        <div class="nav-item yt-item" onclick="showView('yt')">🔴 YT MODE</div>
        <div class="nav-item" style="opacity: 0.3;">🛠️ PROJEKTY</div>
    </div>

    <div id="dashboard" class="view active">
        <h1 style="color: #00ff00;">> ROOT@ROYAAL_C2:~/LOGS_</h1>
        <div id="logs-container">Ładowanie logów...</div>
    </div>

    <div id="yt" class="view">
        <h1 style="color: #ff0000; text-shadow: 0 0 10px #ff0000;">🔴 YT CREATOR COMMAND</h1>
        <div class="stats-grid">
            <div class="stat-card" style="border-left-color: #00ff00;">
                <p>PRZYJĘTO</p><h2 id="stat-accepted">0</h2>
            </div>
            <div class="stat-card" style="border-left-color: #ffcc00;">
                <p>OCZEKUJE</p><h2 id="stat-pending">0</h2>
            </div>
            <div class="stat-card" style="border-left-color: #ff4444;">
                <p>ODRZUCONO</p><h2 id="stat-rejected">0</h2>
            </div>
            <div class="stat-card" style="border-left-color: #ff0000;">
                <p>YT SUBS</p><h2>1,240</h2>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://fvxodipuudkhzykpleul.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            toggleMenu();
        }

        async function fetchLogs() {
            const { data, error } = await _supabase.from('logs').select('*').order('created_at', { ascending: false });
            if (data) {
                renderLogs(data);
                calculateStats(data);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logs-container');
            container.innerHTML = logs.map(log => `
                <div class="log-entry">
                    <span style="color: #555">[${new Date(log.created_at).toLocaleTimeString()}]</span>
                    <strong style="color: ${log.type === 'H1' ? '#00aaff' : '#ffcc00'}"> ${log.type} </strong>
                    <span>${log.title}</span>
                </div>
            `).join('');
        }

        function calculateStats(logs) {
            const acc = logs.filter(l => l.content?.toLowerCase().includes('triaged')).length;
            const pend = logs.filter(l => l.content?.toLowerCase().includes('new')).length;
            const rej = logs.filter(l => l.content?.toLowerCase().includes('n/a')).length;
            
            document.getElementById('stat-accepted').innerText = acc;
            document.getElementById('stat-pending').innerText = pend;
            document.getElementById('stat-rejected').innerText = rej;
        }

        // Real-time update
        _supabase.channel('logs').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'logs' }, payload => {
            fetchLogs();
        }).subscribe();

        fetchLogs();
    </script>
</body>
</html>
