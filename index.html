<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoyaalBugger | Intelligence C2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.05); --gold: #ffae00; --yt: #ff0000; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; overflow-x: hidden; }
        
        #sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); border-right: 1px solid var(--neon); transition: 0.3s; z-index: 9999; padding-top: 80px; }
        #sidebar.open { left: 0; }
        .nav-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; font-size: 11px; letter-spacing: 2px; opacity: 0.6; }
        .nav-item:hover { opacity: 1; color: var(--neon); background: rgba(0,242,255,0.05); }

        #menu-trigger { position: fixed; top: 25px; left: 25px; z-index: 10000; background: var(--card); border: 1px solid var(--neon); color: var(--neon); padding: 10px; border-radius: 10px; cursor: pointer; }

        .container { width: 100%; max-width: 1000px; background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); margin-top: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 30px; padding-left: 50px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; }
        
        .view { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.02); border-radius: 16px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); min-height: 250px; }
        .section-title { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        .bug-item { background: rgba(255, 174, 0, 0.05); border-left: 3px solid var(--gold); padding: 12px; margin: 10px 0; border-radius: 6px; font-size: 13px; line-height: 1.4; }
        .feed-item { background: rgba(0, 242, 255, 0.05); border-left: 3px solid var(--neon); padding: 12px; margin: 10px 0; border-radius: 6px; font-size: 13px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .header { padding-left: 0; } }
    </style>
</head>
<body>

    <button id="menu-trigger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

    <div id="sidebar">
        <div class="nav-item" onclick="showView('main')">🏠 Intelligence Hub</div>
        <div class="nav-item" onclick="showView('yt')" style="color: var(--yt);">🔴 YT MODE (Stats)</div>
        <div class="nav-item" onclick="window.location.href='admin.html'">⌨️ Terminal C2</div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo" id="main-logo">ROYAAL_INTELLIGENCE</div>
            <div style="font-size: 10px; opacity: 0.5;">STATUS: ONLINE</div>
        </div>

        <div id="view-main" class="view active-view">
            <div class="grid">
                <div class="card"><div class="section-title"><span style="color:var(--gold)">●</span> PRIVATE LOGS</div><div id="logs-container">Pobieranie danych...</div></div>
                <div class="card"><div class="section-title"><span style="color:var(--neon)">●</span> GLOBAL BUG FEED</div><div id="rss-feed">Inicjowanie RSS...</div></div>
            </div>
        </div>

        <div id="view-yt" class="view">
            <div class="grid">
                <div class="card" style="border-color: var(--yt);"><div class="section-title">SUBS</div><span style="font-size:32px; font-weight:800; color:var(--yt);">1,240</span></div>
                <div class="card"><div class="section-title">BOUNTY STATS</div><div id="yt-stats">Wczytywanie statystyk...</div></div>
            </div>
        </div>
    </div>

    <script>
        // --- POJEDYNCZA KONFIGURACJA ---
        const CONFIG = {
            url: 'https://fvxodipuudkhzykpleul.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2eG9kaXB1dWRraHp5a3BsZXVsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDkyNjIsImV4cCI6MjA5MDM4NTI2Mn0.uBTUlc0-aoOzWsroJ1dvhV4JFbjJXnJ8EZjuMAAiQMQ'
        };

        const _supabase = supabase.createClient(CONFIG.url, CONFIG.key);

        function showView(v) {
            document.querySelectorAll('.view').forEach(x => x.classList.remove('active-view'));
            document.getElementById('view-'+v).classList.add('active-view');
            document.getElementById('sidebar').classList.remove('open');
        }

        async function fetchLogs() {
            const container = document.getElementById('logs-container');
            try {
                // Najprostszy select, bez skomplikowanego sortowania, które mogło sypać błędem 400
                const { data, error } = await _supabase.from('logs').select('*');

                if (error) throw error;

                if (data && data.length > 0) {
                    container.innerHTML = data.reverse().slice(0, 5).map(l => `
                        <div class="bug-item">
                            <b style="color:var(--gold)">${l.title || 'LOG'}</b><br>
                            ${l.content || '...'}
                        </div>
                    `).join('');
                    document.getElementById('yt-stats').innerText = `Aktywne logi: ${data.length}`;
                } else {
                    container.innerHTML = "Tabela 'logs' jest pusta.";
                }
            } catch (e) {
                console.error("Critical Failure:", e);
                container.innerHTML = `<div style="color:#ff4444">Błąd: ${e.message}</div>`;
            }
        }

        async function fetchRSS() {
            const feed = document.getElementById('rss-feed');
            try {
                // Korzystamy z HackerOne Hacktivity
                const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent("https://hackerone.com/hacktivity.rss")}`);
                const d = await res.json();
                if(d.items) {
                    feed.innerHTML = d.items.slice(0, 5).map(i => `
                        <div class="feed-item">
                            <b style="color:var(--neon)">${i.author || 'H1'}</b><br>
                            ${i.title.substring(0, 60)}...
                        </div>
                    `).join('');
                }
            } catch (e) { feed.innerHTML = "RSS Unavailable."; }
        }

        // Start
        fetchLogs();
        fetchRSS();
    </script>
</body>
</html>
