<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royaal | Private C2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: rgba(255, 255, 255, 0.03); --gold: #ffae00; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; border: 1px solid var(--neon); border-radius: 15px; padding: 20px; background: var(--card); box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); margin: auto; }
        .header { border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; min-height: 400px; overflow-y: auto; }
        .label { font-size: 10px; color: var(--neon); letter-spacing: 2px; margin-bottom: 15px; display: block; }
        
        .item { padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 12px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .supa-item { border-left: 3px solid var(--gold); background: rgba(255, 174, 0, 0.05); }
        .h1-item { border-left: 3px solid #fff; background: rgba(255, 255, 255, 0.05); }
        
        .status-badge { font-size: 9px; padding: 2px 5px; border-radius: 3px; background: #222; margin-right: 5px; text-transform: uppercase; color: var(--neon); }
        .err-link { color: #fff; text-decoration: underline; font-weight: bold; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div style="color: var(--neon); font-weight: bold; letter-spacing: 3px;">JULIUSZ_PRIVATE_C2</div>
        <div id="clock" style="font-size: 10px; opacity: 0.6;">00:00:00</div>
    </div>

    <div class="grid">
        <div class="card">
            <span class="label">● MY_SUPABASE_STREAM</span>
            <div id="supa-stream">Inicjowanie...</div>
        </div>

        <div class="card">
            <span class="label">● MY_H1_REPORTS</span>
            <div id="h1-stream">Czekam na autoryzację H1...</div>
        </div>
    </div>
</div>

<script>
    // 1. ŁADOWANIE LOGÓW Z HACKERONE PRZEZ TWÓJ SERWER (API)
    async function loadH1() {
        const out = document.getElementById('h1-stream');
        try {
            out.innerHTML = '<span style="opacity:0.5">Łączenie z Agentem H1...</span>';
            
            const response = await fetch('/api/h1');
            const res = await response.json();

            // Jeśli serwer (backend) zwrócił błąd
            if (res.error) {
                out.innerHTML = `<div class="item" style="border-left:3px solid red; background:rgba(255,0,0,0.1)">
                    <b style="color:#ff4444">BŁĄD AGENTA:</b><br>${res.error}
                    ${res.status ? `<br><small>Kod: ${res.status}</small>` : ''}
                </div>`;
                return;
            }

            // Jeśli dostaliśmy dane (format z /v1/hackers/reports)
            if (res.data && Array.isArray(res.data) && res.data.length > 0) {
                out.innerHTML = res.data.map(r => `
                    <div class="item h1-item">
                        <span class="status-badge">${r.attributes.state}</span>
                        <b style="color:var(--gold)">#${r.id}</b><br>
                        <span style="opacity:0.9">${r.attributes.title}</span>
                    </div>`).join('');
            } 
            // Jeśli autoryzacja przeszła, ale nie masz raportów
            else {
                out.innerHTML = "<div class='item'>Połączono z H1: Brak raportów (Czyste konto).</div>";
            }
        } catch (e) {
            console.error(e);
            out.innerHTML = "<div class='item' style='color:red'>Agent H1 nie odpowiada (Błąd połączenia).</div>";
        }
    }

    // 2. ŁADOWANIE SUPABASE
    async function loadSupa() {
        const out = document.getElementById('supa-stream');
        try {
            const response = await fetch('/api/supa');
            const data = await response.json();

            if (Array.isArray(data) && data.length > 0) {
                out.innerHTML = data.reverse().map(l => `
                    <div class="item supa-item">
                        <b style="color:var(--gold)">${l.title || 'LOG'}</b><br>
                        <span style="opacity:0.8">${l.content || '...'}</span>
                    </div>`).join('');
            } else {
                out.innerHTML = "Baza jest pusta (Cisza przed burzą...).";
            }
        } catch (e) {
            out.innerHTML = "<div class='item' style='color:red'>Błąd bazy danych.</div>";
            console.error(e);
        }
    }

    // START
    window.onload = () => {
        loadH1();
        loadSupa();
    };

    // ZEGAR
    setInterval(() => {
        const c = document.getElementById('clock');
        if(c) c.innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>
    
</body>
</html>
